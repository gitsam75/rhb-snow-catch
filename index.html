<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RhB Snow">
    
    <title>RhB Snow Catch - Pro Mode</title>
    <style>
        :root {
            --case-color: #a31d1d;
            --screen-bg: #9ead86;
            --lcd-ink: rgba(0, 0, 0, 0.9);
        }

        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            background-color: #1a1a1a;
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            overscroll-behavior-y: contain; /* Blockiert Pull-to-Refresh */
        }

        #game-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        #game-pad {
            background-color: var(--case-color);
            width: 800px; height: 450px; border-radius: 40px;
            display: grid; grid-template-columns: 180px 1fr 180px; align-items: center;
            padding: 20px; box-shadow: inset 0 5px 15px rgba(255,255,255,0.3), 0 10px 0 #6d1313;
            border: 5px solid #6d1313; transform-origin: center center; transition: transform 0.3s ease;
        }

        #screen-container {
            background: linear-gradient(145deg, #bbb, #eee);
            padding: 10px; border-radius: 12px; border: 3px solid #333;
            width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;
        }

        #screen {
            background-color: var(--screen-bg); width: 100%; height: 100%;
            position: relative; border: 2px solid #7a8664; overflow: hidden;
        }

        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--screen-bg); z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        #highscore-board {
            margin-top: 15px; padding: 5px; width: 80%; max-height: 120px; overflow-y: auto;
            border: 1px dashed var(--lcd-ink); font-family: 'Courier New', Courier, monospace;
            font-size: 11px; color: var(--lcd-ink); text-align: left;
        }

        .left-box, .right-box { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .move-axis { margin-top: 100px; } 

        .control-btn {
            width: 70px; height: 70px; background: #222; border: 5px solid #000;
            border-radius: 50%; color: #fff; font-size: 24px; cursor: pointer;
            box-shadow: 0 5px 0 #000; display: flex; justify-content: center; align-items: center;
            touch-action: none; 
        }
        .control-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; background: #444; }
        .action-btn { background: #cc0000; border-color: #800; box-shadow: 0 5px 0 #800; }
        .btn-label { margin-top: 5px; font-size: 10px; color: #fff; font-weight: bold; }

        .sprite { position: absolute; fill: var(--lcd-ink); }
        .flake { font-size: 22px; position: absolute; color: var(--lcd-ink); z-index: 5; font-weight: bold; }
        #train-unit { bottom: 15px; display: flex; align-items: flex-end; position: absolute; }
        .ui { position: absolute; top: 5px; left: 5px; right: 5px; font-size: 11px; font-weight: bold; color: var(--lcd-ink); display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="game-pad">
        <div class="left-box">
            <div class="move-axis" id="btn-left">
                <div class="control-btn">◀</div>
                <div class="btn-label">LINKS</div>
            </div>
        </div>

        <div id="screen-container">
            <div id="screen">
                <div id="start-overlay">
                    <h2 style="color:var(--lcd-ink); margin:0;">RhB SNOW CATCH</h2>
                    <p style="color:var(--lcd-ink); font-size:12px; margin-bottom: 10px;">Depot Pontresina</p>
                    
                    <button id="btn-start" onclick="startGame()" style="background:#222; color:white; border:none; padding:15px 25px; border-radius:5px; font-weight:bold; font-size: 16px; cursor:pointer;">START</button>
                    
                    <div id="highscore-board"></div>
                </div>

                <div class="ui">
                    <div>VORRAT: <span id="ammo">40</span></div>
                    <div style="text-align:right;">
                        SCHAUFEL: <span id="snow-val">0</span>/5<br>
                        WAGEN: <span id="wagon-val">0</span>/20
                    </div>
                </div>
                
                <div id="yeti" style="position:absolute; top:10px; left:45%; font-size:35px;">👹</div>
                <div id="flakes-container"></div>

                <div id="player-svg" style="position:absolute; top:180px; transform-origin: center;">
                    <svg viewBox="0 0 75 95" width="60" height="75">
                        <ellipse cx="30" cy="15" rx="9" ry="11" fill="black" />
                        <rect x="20" y="5" width="20" height="4" fill="black" />
                        <rect x="27" y="26" width="7" height="30" rx="2" fill="black" />
                        <path d="M28 55 L18 80 L12 80 M32 55 L42 80 L48 80" stroke="black" stroke-width="4" fill="none" />
                        <path d="M30 35 L55 45 L62 45" stroke="black" stroke-width="3" fill="none" />
                        <rect x="58" y="42" width="18" height="5" fill="black" />
                        <path id="shovel-snow-load" d="M58 42 Q67 -5 77 42 Z" fill="black" style="display:none;" />
                    </svg>
                </div>

                <div id="train-unit">
                    <svg width="70" height="50" viewBox="0 0 90 60"><rect x="5" y="15" width="80" height="40" rx="4" fill="black" /><rect x="10" y="20" width="18" height="15" fill="#9ead86" /><rect x="62" y="20" width="18" height="15" fill="#9ead86" /><circle cx="20" cy="55" r="5" fill="black" /><circle cx="70" cy="55" r="5" fill="black" /></svg>
                    <svg width="90" height="50" viewBox="0 0 110 60"><rect x="0" y="45" width="110" height="6" stroke="black" stroke-width="3" fill="none" /><line x1="10" y1="45" x2="10" y2="15" stroke="black" stroke-width="2" /><line x1="55" y1="45" x2="55" y2="15" stroke="black" stroke-width="2" /><line x1="100" y1="45" x2="100" y2="15" stroke="black" stroke-width="2" /><path id="w-snow-1" d="M10 45 Q35 25 60 45 Z" style="fill:black;display:none;" /><path id="w-snow-2" d="M50 45 Q80 20 105 45 Z" style="fill:black;display:none;" /><path id="w-snow-3" d="M20 35 Q55 5 95 35 Z" style="fill:black;display:none;" /><circle cx="30" cy="55" r="5" fill="black" /><circle cx="80" cy="55" r="5" fill="black" /></svg>
                </div>
            </div>
        </div>

        <div class="right-box">
            <div id="btn-out">
                <div class="control-btn action-btn">OUT</div>
                <div class="btn-label">ABLADEN</div>
            </div>
            <div id="btn-right">
                <div class="control-btn">▶</div>
                <div class="btn-label">RECHTS</div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Service Worker (Wichtig für PWA Installation) ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Info:', err));
        });
    }

    // --- Auto-Skalierung ---
    function resizeGame() {
        const pad = document.getElementById('game-pad');
        const winW = window.innerWidth;
        const winH = window.innerHeight;
        
        let scale;
        if (winH > winW) {
            scale = Math.min((winH - 20) / 800, (winW - 20) / 450);
            pad.style.transform = `rotate(90deg) scale(${scale})`;
        } else {
            scale = Math.min((winW - 20) / 800, (winH - 20) / 450);
            pad.style.transform = `rotate(0deg) scale(${scale})`;
        }
    }
    window.addEventListener('resize', resizeGame);
    resizeGame();

    // --- Audio System ---
    let audioCtx = null; 
    function playBeep(f, d, t="square", v=0.08) {
        if(!audioCtx) return; 
        try {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime); 
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
        } catch(e) {}
    }

    // --- Spiel Variablen ---
    let pPos = 2;       // 0-7 Horizontale Position
    let pDir = 1;       // 1 = Rechts, -1 = Links
    let tPos = 0, tDir = 1, snowInv = 0, wagonFill = 0, flakes = [], flakesLeft = 40, gameActive = false;

    // --- Highscore System ---
    function saveHighscore(score) {
        try {
            let history = JSON.parse(localStorage.getItem('rhbHistory')) || [];
            let now = new Date();
            let dateStr = `${now.getDate()}.${now.getMonth()+1}. ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            
            history.unshift({ date: dateStr, score: score });
            if(history.length > 10) history = history.slice(0, 10); 
            
            localStorage.setItem('rhbHistory', JSON.stringify(history));
            updateHighscoreBoard();
        } catch(e) {}
    }

    function updateHighscoreBoard() {
        try {
            let history = JSON.parse(localStorage.getItem('rhbHistory')) || [];
            let board = document.getElementById('highscore-board');
            if(history.length === 0) {
                board.innerHTML = "Noch keine Einträge.";
                return;
            }
            let html = "<strong>Letzte 10 Schichten:</strong><br>";
            history.forEach((entry, index) => {
                let symbol = entry.score >= 20 ? "🏆" : "❄️";
                html += `${index+1}. ${entry.date} - ${entry.score}/20 ${symbol}<br>`;
            });
            board.innerHTML = html;
        } catch(e) {
            document.getElementById('highscore-board').innerHTML = "Highscore lokal deaktiviert.";
        }
    }

    // --- Spiel Logik ---
    function startGame() {
        // 1. ABSOLUTE PRIORITÄT: Spiel aktivieren und Overlay weg (verhindert Hängenbleiben)
        document.getElementById('start-overlay').style.display = 'none';
        gameActive = true;

        // 2. Danach erst potenziell fehleranfällige Dinge wie Audio laden (im gesicherten Try/Catch)
        try {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        } catch(err) { console.log("Audio in PWA geblockt."); }

        // 3. Fullscreen (wird im Standalone/PWA Mode eh vom Browser ignoriert)
        try {
            if (!window.matchMedia('(display-mode: standalone)').matches) {
                let elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen().catch(()=>{});
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            }
        } catch(err) {}

        setTimeout(resizeGame, 300);
    }

    function resetGame() {
        pPos=2; pDir=1; tPos=0; tDir=1; snowInv=0; wagonFill=0; flakes=[]; flakesLeft=40;
        document.getElementById('start-overlay').style.display = 'flex';
        render();
    }

    function doAction(action) {
        if(!gameActive) return;
        
        if(action === 'left') { 
            pDir = -1; // Männchen dreht sich nach links
            if(pPos > 0) pPos--; 
            playBeep(250, 0.05); 
        }
        if(action === 'right') { 
            pDir = 1; // Männchen dreht sich nach rechts
            if(pPos < 7) pPos++; 
            playBeep(250, 0.05); 
        }
        if(action === 'out') {
            if(Math.abs(pPos - (tPos + 1.5)) <= 1.5 && snowInv > 0){ 
                wagonFill+=snowInv; snowInv=0; 
                playBeep(700, 0.15, "triangle"); 
            } else {
                playBeep(80, 0.1);
            }
        }
        render();
    }

    setInterval(() => {
        if(!gameActive) return;
        
        tPos += tDir; if(tPos>=4 || tPos<=0) tDir*=-1;
        playBeep(120, 0.04, "sine", 0.03);

        flakes.forEach((f, i) => {
            f.y++;
            
            // DIE MAGIE DES DREHENS: 
            // Die Schaufelposition errechnet sich nun aus der Körperposition + Blickrichtung
            let shovelPos = pPos + pDir; 
            
            if(f.y === 4 && f.x === shovelPos) { 
                if(snowInv < 5) {
                    snowInv++; 
                    playBeep(900, 0.1);
                } 
                flakes.splice(i,1); 
            }
            else if(f.y > 6) flakes.splice(i,1);
        });

        if(flakesLeft>0 && flakes.length<2 && Math.random()>0.6) {
            flakes.push({x: Math.floor(Math.random()*8), y:0}); flakesLeft--;
            playBeep(500, 0.05);
        }
        
        if(flakesLeft===0 && flakes.length===0 && snowInv===0) checkEnd();
        render();
    }, 800);

    function checkEnd() {
        gameActive=false;
        saveHighscore(wagonFill);
        if(wagonFill>=20) alert("Lok 1 vorwärts Depot Pontresina!");
        else alert("Der Winter ist noch lang, Pfeife!!!");
        resetGame(); 
    }

    function render() {
        const playerSvg = document.getElementById('player-svg');
        // Körper positionieren
        playerSvg.style.left = (pPos * 45) + "px";
        // SVG umdrehen je nach Blickrichtung (pDir = 1 oder -1)
        playerSvg.style.transform = `scaleX(${pDir})`;

        document.getElementById('shovel-snow-load').style.display = snowInv>0 ? "block" : "none";
        document.getElementById('snow-val').innerText = snowInv;
        document.getElementById('ammo').innerText = flakesLeft;
        document.getElementById('train-unit').style.left = (tPos * 50) + "px";
        document.getElementById('wagon-val').innerText = wagonFill;
        
        for(let i=1; i<=3; i++) document.getElementById('w-snow-'+i).style.display = wagonFill >= (i*6) ? "block" : "none";
        
        const c = document.getElementById('flakes-container'); 
        c.innerHTML = '';
        flakes.forEach(f => {
            const d = document.createElement('div'); 
            d.className='flake'; d.innerText='❄️';
            d.style.left=(f.x*45+15)+'px'; 
            d.style.top=(f.y*42+60)+'px'; 
            c.appendChild(d);
        });
    }

    // --- Input Listener ---
    function bindGameButton(id, action) {
        const btn = document.getElementById(id);
        if(btn) {
            btn.addEventListener('pointerdown', (e) => {
                e.preventDefault(); 
                doAction(action);
            });
            btn.addEventListener('contextmenu', e => e.preventDefault());
        }
    }

    bindGameButton('btn-left', 'left');
    bindGameButton('btn-right', 'right');
    bindGameButton('btn-out', 'out');

    document.addEventListener('keydown', (e) => {
        if(!gameActive) return;
        if(e.key === "ArrowLeft") doAction('left');
        if(e.key === "ArrowRight") doAction('right');
        if(e.key === " " || e.key === "ArrowUp") doAction('out');
    });

    updateHighscoreBoard();
    render();
</script>
</body>
</html>
