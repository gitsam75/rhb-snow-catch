<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#a31d1d">
    <title>RhB Snow Catch - Highscore Edition</title>
    <style>
        :root {
            --case-color: #a31d1d;
            --screen-bg: #9ead86;
            --lcd-ink: rgba(0, 0, 0, 0.9);
        }

        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #game-pad {
            background-color: var(--case-color);
            /* Feste Basisgröße für perfekte Skalierung */
            width: 800px;
            height: 450px;
            border-radius: 40px;
            display: grid;
            grid-template-columns: 1fr 2.5fr 1fr;
            align-items: center;
            padding: 20px;
            box-shadow: inset 0 5px 15px rgba(255,255,255,0.3), 0 10px 0 #6d1313;
            border: 5px solid #6d1313;
            /* Wichtig für die Drehung und Skalierung */
            transform-origin: center center;
            transition: transform 0.3s ease;
        }

        #screen-container {
            background: linear-gradient(145deg, #bbb, #eee);
            padding: 10px;
            border-radius: 12px;
            border: 3px solid #333;
        }

        #screen {
            background-color: var(--screen-bg);
            width: 100%;
            aspect-ratio: 4 / 3;
            position: relative;
            border: 2px solid #7a8664;
            overflow: hidden;
        }

        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--screen-bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #highscore-board {
            margin-top: 15px;
            padding: 5px;
            width: 80%;
            max-height: 120px;
            overflow-y: auto;
            border: 1px dashed var(--lcd-ink);
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            color: var(--lcd-ink);
            text-align: left;
        }

        .left-box, .right-box { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .move-axis { margin-top: 100px; } 

        .control-btn {
            width: 70px; height: 70px; background: #222; border: 5px solid #000;
            border-radius: 50%; color: #fff; font-size: 24px; cursor: pointer;
            box-shadow: 0 5px 0 #000; display: flex; justify-content: center; align-items: center;
            touch-action: none; 
        }
        .control-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; background: #444; }
        .action-btn { background: #cc0000; border-color: #800; box-shadow: 0 5px 0 #800; }
        .btn-label { margin-top: 5px; font-size: 10px; color: #fff; font-weight: bold; }

        .sprite { position: absolute; fill: var(--lcd-ink); }
        .flake { font-size: 22px; position: absolute; color: var(--lcd-ink); z-index: 5; font-weight: bold; }
        #train-unit { bottom: 15px; display: flex; align-items: flex-end; position: absolute; }
        .ui { position: absolute; top: 5px; left: 5px; right: 5px; font-size: 11px; font-weight: bold; color: var(--lcd-ink); display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="game-pad">
    <div class="left-box">
        <div class="move-axis" id="btn-left">
            <div class="control-btn">◀</div>
            <div class="btn-label">LINKS</div>
        </div>
    </div>

    <div id="screen-container">
        <div id="screen">
            <div id="start-overlay">
                <h2 style="color:var(--lcd-ink); margin:0;">RhB SNOW CATCH</h2>
                <p style="color:var(--lcd-ink); font-size:12px; margin-bottom: 10px;">Depot Pontresina</p>
                <button id="btn-start" onclick="startGame()" style="background:#222; color:white; border:none; padding:10px 20px; border-radius:5px; font-weight:bold; cursor:pointer;">START</button>
                
                <div id="highscore-board"></div>
            </div>

            <div class="ui">
                <div>VORRAT: <span id="ammo">40</span></div>
                <div style="text-align:right;">
                    SCHAUFEL: <span id="snow-val">0</span>/5<br>
                    WAGEN: <span id="wagon-val">0</span>/20
                </div>
            </div>
            
            <div id="yeti" style="position:absolute; top:10px; left:45%; font-size:35px;">👹</div>
            <div id="flakes-container"></div>

            <div id="player-svg" style="position:absolute; top:180px;">
                <svg viewBox="0 0 75 95" width="60" height="75">
                    <ellipse cx="30" cy="15" rx="9" ry="11" fill="black" />
                    <rect x="20" y="5" width="20" height="4" fill="black" />
                    <rect x="27" y="26" width="7" height="30" rx="2" fill="black" />
                    <path d="M28 55 L18 80 L12 80 M32 55 L42 80 L48 80" stroke="black" stroke-width="4" fill="none" />
                    <path d="M30 35 L55 45 L62 45" stroke="black" stroke-width="3" fill="none" />
                    <rect x="58" y="42" width="18" height="5" fill="black" />
                    <path id="shovel-snow-load" d="M58 42 Q67 -5 77 42 Z" fill="black" style="display:none;" />
                </svg>
            </div>

            <div id="train-unit">
                <svg width="70" height="50" viewBox="0 0 90 60"><rect x="5" y="15" width="80" height="40" rx="4" fill="black" /><rect x="10" y="20" width="18" height="15" fill="#9ead86" /><rect x="62" y="20" width="18" height="15" fill="#9ead86" /><circle cx="20" cy="55" r="5" fill="black" /><circle cx="70" cy="55" r="5" fill="black" /></svg>
                <svg width="90" height="50" viewBox="0 0 110 60"><rect x="0" y="45" width="110" height="6" stroke="black" stroke-width="3" fill="none" /><line x1="10" y1="45" x2="10" y2="15" stroke="black" stroke-width="2" /><line x1="55" y1="45" x2="55" y2="15" stroke="black" stroke-width="2" /><line x1="100" y1="45" x2="100" y2="15" stroke="black" stroke-width="2" /><path id="w-snow-1" d="M10 45 Q35 25 60 45 Z" style="fill:black;display:none;" /><path id="w-snow-2" d="M50 45 Q80 20 105 45 Z" style="fill:black;display:none;" /><path id="w-snow-3" d="M20 35 Q55 5 95 35 Z" style="fill:black;display:none;" /><circle cx="30" cy="55" r="5" fill="black" /><circle cx="80" cy="55" r="5" fill="black" /></svg>
            </div>
        </div>
    </div>

    <div class="right-box">
        <div id="btn-out">
            <div class="control-btn action-btn">OUT</div>
            <div class="btn-label">ABLADEN</div>
        </div>
        <div id="btn-right">
            <div class="control-btn">▶</div>
            <div class="btn-label">RECHTS</div>
        </div>
    </div>
</div>

<script>
    // --- NEU: Auto-Skalierung und Drehung ---
    function resizeGame() {
        const pad = document.getElementById('game-pad');
        const winW = window.innerWidth;
        const winH = window.innerHeight;
        
        let scale;
        // Wenn hochkant, drehen wir das Spiel um 90 Grad
        if (winH > winW) {
            scale = Math.min((winH - 20) / 800, (winW - 20) / 450);
            pad.style.transform = `rotate(90deg) scale(${scale})`;
        } else {
            scale = Math.min((winW - 20) / 800, (winH - 20) / 450);
            pad.style.transform = `rotate(0deg) scale(${scale})`;
        }
    }
    // Hört auf Bildschirmänderungen
    window.addEventListener('resize', resizeGame);
    // Einmal beim Start aufrufen
    resizeGame();

    // --- Audio System ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(f, d, t="square", v=0.08) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const o=audioCtx.createOscillator(), g=audioCtx.createGain();
        o.type=t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+d);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d);
    }

    // --- Spiel Variablen ---
    let pPos=2, tPos=0, tDir=1, snowInv=0, wagonFill=0, flakes=[], flakesLeft=40, gameActive=false;

    // --- Highscore System ---
    function saveHighscore(score) {
        let history = JSON.parse(localStorage.getItem('rhbHistory')) || [];
        let now = new Date();
        let dateStr = `${now.getDate()}.${now.getMonth()+1}. ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
        
        history.unshift({ date: dateStr, score: score });
        if(history.length > 10) history = history.slice(0, 10); 
        
        localStorage.setItem('rhbHistory', JSON.stringify(history));
        updateHighscoreBoard();
    }

    function updateHighscoreBoard() {
        let history = JSON.parse(localStorage.getItem('rhbHistory')) || [];
        let board = document.getElementById('highscore-board');
        if(history.length === 0) {
            board.innerHTML = "Noch keine Einträge.";
            return;
        }
        
        let html = "<strong>Letzte 10 Schichten:</strong><br>";
        history.forEach((entry, index) => {
            let symbol = entry.score >= 20 ? "🏆" : "❄️";
            html += `${index+1}. ${entry.date} - ${entry.score}/20 ${symbol}<br>`;
        });
        board.innerHTML = html;
    }

    // --- Spielsteuerung / Logik ---
    function startGame() {
        // NEU: Vollbild anfordern (in try/catch, falls Browser es blockiert)
        try {
            let elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(err => console.log(err));
            } else if (elem.webkitRequestFullscreen) { // Safari
                elem.webkitRequestFullscreen();
            }
        } catch(e) {}

        document.getElementById('start-overlay').style.display = 'none';
        gameActive = true;
        if(audioCtx.state === 'suspended') audioCtx.resume();
        
        // Kurz warten, bis Fullscreen aktiv ist, dann
